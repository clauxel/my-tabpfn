name = "my-tabpfn"
main = "worker/index.js"
compatibility_date = "2026-05-06"
workers_dev = true
routes = [
  { pattern = "tabpfn.site/*", zone_name = "tabpfn.site" },
  { pattern = "www.tabpfn.site/*", zone_name = "tabpfn.site" }
]

[vars]
POLAR_API_BASE = "https://api.polar.sh"
POLAR_ENV = "live"

# Store one live Polar key as a Worker secret:
# wrangler secret put API_PROD_KEY
# Accepted aliases: POLAR_API_KEY or account Secrets Store binding POLAR_KEY.

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/*"
]

[[d1_databases]]
binding = "DB"
# Shared production analytics D1. Rows are isolated by site_key.
database_name = "openclaw-launch"
database_id = "5c31068a-d85a-4c83-9efe-01e2de1ad22b"
